# CI values for chart-neuvector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


rules:
  admission:
    mode: "monitor" # one of: monitor, protect
  response:
    policies:
      - name: admission-control-denied
        event: admission-control
        conditions:
          - type: name
            value: Admission.Control.Denied
        actions:
          - webhook
        disable: false
      - name: security-event-all
        event: security-event
        conditions: []
        actions:
          - webhook
        disable: true
      - name: security-event-error
        event: security-event
        conditions:
          - type: level
            value: Error
        actions:
          - webhook
        disable: true
      - name: security-event-privilege-escalation
        event: security-event
        conditions:
          - type: name
            value: Container.Privilege.Escalation
        actions:
          - quarantine
        disable: true
      - name: cve-report-high
        event: cve-report
        conditions:
          - type: cve-high
            value: "10"
        actions:
          - quarantine
        disable: true
      - name: event-container-quarantined
        event: event
        conditions:
          - type: name
            value: Container.Quarantined
        actions:
          - webhook
        disable: false
      - name: compliance-5-4
        event: compliance
        conditions:
          - type: name
            value: "5.4"
        actions:
          - webhook
        disable: true
config:
  sleep: 10 # we dont use backup in ci, we don't need long sleep

keyVaults:
  cftneuvector:
    secrets:
      - neuvector-admin-password
      - neuvector-license-dev
      - neuvector-slack-webhook
      - neuvector-new-admin-password
global:
  enableKeyVaults: true
  tenantId: 531ff96d-0ae9-462a-8d2d-bec7c0b42082
  environment: sbox

keyvault:
  name: cftneuvector
  licensesecretname: neuvector-license-dev

neuvector:
  cve:
    scanner:
      image:
        repository: imported/neuvector/scanner
