# CI values for chart-neuvector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


rules:
  admission:
    mode: "monitor" # one of: monitor, protect
    defaultRules:
      - action: allow
        comment: Allow admin namespaces
        criteria:
          - name: namespace
            op: containsAny
            value: knode-system,monitoring,flux-system,dynatrace,azureserviceoperator-system,cert-manager,keda,admin,kured,artifactory,pact-broker
      - action: allow
        comment: Allow HMCTS registries
        criteria:
          - name: imageRegistry
            op: containsAny
            value: https://hmctsprod.azurecr.io,https://hmctssbox.azurecr.io/,https://hmctspublic.azurecr.io/,https://hmctsprivate.azurecr.io/,https://sdshmctspublic.azurecr.io/
      - action: deny
        comment: Default deny
        criteria:
          - name: imageRegistry
            op: containsAny
            value: https://localhost/,https://*.*/
  response:
    defaultPolicies:
      - name: admission-control-denied
        event: admission-control
        conditions:
          - type: name
            value: Admission.Control.Denied
        actions:
          - webhook
        disable: false
      - name: security-event-all
        event: security-event
        conditions: []
        actions:
          - webhook
        disable: true
      - name: security-event-error
        event: security-event
        conditions:
          - type: level
            value: Error
        actions:
          - webhook
        disable: true
      - name: security-event-privilege-escalation
        event: security-event
        conditions:
          - type: name
            value: Container.Privilege.Escalation
        actions:
          - quarantine
        disable: true
      - name: cve-report-high
        event: cve-report
        conditions:
          - type: cve-high
            value: "10"
        actions:
          - quarantine
        disable: true
      - name: event-container-quarantined
        event: event
        conditions:
          - type: name
            value: Container.Quarantined
        actions:
          - webhook
        disable: false
      - name: compliance-5-4
        event: compliance
        conditions:
          - type: name
            value: "5.4"
        actions:
          - webhook
        disable: true
  network:
    defaultRules:
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: applicationinsights
          namespace: ""
        spec:
          egress:
            - action: allow
              applications:
                - HTTP
                - SSL
              name: ApplicationInsights-egress
              ports: tcp/443
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: dc.services.visualstudio.com
                  - key: address
                    op: =
                    value: rt.services.visualstudio.com
                  - key: address
                    op: =
                    value: dc.applicationinsights.microsoft.com
                  - key: address
                    op: =
                    value: euw.rt.prod.applicationinsights.trafficmanager.net
                name: ApplicationInsights
                original_name: ""
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: dc.services.visualstudio.com
                - key: address
                  op: =
                  value: rt.services.visualstudio.com
                - key: address
                  op: =
                  value: dc.applicationinsights.microsoft.com
                - key: address
                  op: =
                  value: euw.rt.prod.applicationinsights.trafficmanager.net
              name: ApplicationInsights
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: azurepostgresql
          namespace: ""
        spec:
          egress:
            - action: allow
              applications:
                - HTTP
                - PostgreSQL
                - SSL
              name: AzurePostgreSQL-egress
              ports: tcp/5432
              priority: 0
              selector:
                comment: ""
                criteria:
                  - key: address
                    op: =
                    value: '*.postgres.database.azure.com'
                name: AzurePostgreSQL
                original_name: ""
          file: []
          ingress: []
          process: []
          target:
            policymode: N/A
            selector:
              comment: ""
              criteria:
                - key: address
                  op: =
                  value: '*.postgres.database.azure.com'
              name: AzurePostgreSQL
              original_name: ""
      - apiVersion: neuvector.com/v1
        kind: NvClusterSecurityRule
        metadata:
          name: govukbankholidays
          namespace: ""
