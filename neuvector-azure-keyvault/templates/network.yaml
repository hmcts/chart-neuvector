{{- $customRules := .Values.rules.network.customRules | default (list) -}}
{{- $defaultRules := .Values.rules.network.defaultRules | default (list) -}}
{{- $rules := concat $customRules $defaultRules -}}
{{- range $rule := $rules }}
---
apiVersion: neuvector.com/v1
kind: NvClusterSecurityRule
metadata:
  name: {{ required "rules.network rules[].name is required" $rule.name | lower | replace "_" "-" | trunc 63 | trimSuffix "-" }}
  labels:
    chart: {{ template "chart-neuvector.chart" $ }}
    release: {{ $.Release.Name }}
    heritage: {{ $.Release.Service }}
spec:
  {{- if $rule.egress }}
  egress:
    {{- toYaml $rule.egress | nindent 4 }}
  {{- else }}
  egress: []
  {{- end }}
  {{- if $rule.ingress }}
  ingress:
    {{- toYaml $rule.ingress | nindent 4 }}
  {{- else }}
  ingress: []
  {{- end }}
  {{- if $rule.file }}
  file:
    {{- toYaml $rule.file | nindent 4 }}
  {{- else }}
  file: []
  {{- end }}
  {{- if $rule.process }}
  process:
    {{- toYaml $rule.process | nindent 4 }}
  {{- else }}
  process: []
  {{- end }}
  target:
    policymode: {{ default "Monitor" $rule.target.policymode }}
    selector:
      {{- toYaml $rule.target.selector | nindent 6 }}
{{- end }}
