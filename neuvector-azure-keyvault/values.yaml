# Default values for chart-neuvector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

useWorkloadIdentity: true

rules:
  admission:
    enable: true
    mode: "protect"  # one of: monitor, protect
    rules: []
    defaultAction: "allow"
    admClientMode: "service"
    service: "neuvector"
  response:
    # Response rules are rendered as NvResponseRuleSecurityRule CRDs (NeuVector 2.8.8+).
    # Each entry maps 1:1 to a CRD instance. The 'name' field is used as the
    # Kubernetes resource name and must be a valid DNS subdomain (lowercase
    # alphanumeric characters, '-' or '.', and must start and end with an
    # alphanumeric character).
    # Available events: event, security-event, cve-report, compliance, admission-control
    # Available actions: quarantine, suppress-log, webhook
    # Example:
    #   policies:
    #     - name: admission-control-denied
    #       event: admission-control
    #       conditions:
    #         - type: name
    #           value: Admission.Control.Denied
    #       actions:
    #         - webhook
    #       disable: false
    policies: []
  network: []

groups: []

config:
  sleep: 180
  forceLicenseUpdate: false
  # Set to true via a Flux patch to enable verbose curl output and response body
  # logging for troubleshooting without requiring a code change.
  debug: false

neuvector:
  registry: hmctsprod.azurecr.io
  crdwebhook:
    enabled: false

  containerd:
    enabled: true

  manager:
    image:
      repository: imported/neuvector/manager
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - neuvector-manager-pod
              topologyKey: "kubernetes.io/hostname"
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: kubernetes.azure.com/mode
                  operator: In
                  values:
                    - system
    svc:
      type: ClusterIP
    env:
      ssl: true
  cve:
    scanner:
      image:
        repository: imported/neuvector/scanner
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - neuvector-scanner-pod
                topologyKey: "kubernetes.io/hostname"
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.azure.com/mode
                    operator: In
                    values:
                      - system
    updater:
      image:
        repository: imported/neuvector/updater
  controller:
    image:
      repository: imported/neuvector/controller
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - neuvector-controller-pod
              topologyKey: "kubernetes.io/hostname"
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: kubernetes.azure.com/mode
                  operator: In
                  values:
                    - system
    ingress:
      enabled: true
      host: neuvector.hmcts.com
      path: "/api"
    apisvc:
      type: ClusterIP

  enforcer:
    image:
      repository: imported/neuvector/enforcer

global:
  enableKeyVaults: true
  tenantId: 531ff96d-0ae9-462a-8d2d-bec7c0b42082

keyvault:
  licensesecretname: neuvector-license-dev
